<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Charitize - Charity Organization Website Template</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <!-- Favicon -->
    <link href="{{ url_for('static', filename='img/favicon.ico') }}" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@600;700&family=Open+Sans&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="{{ url_for('static', filename='lib/animate/animate.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='lib/owlcarousel/assets/owl.carousel.min.css') }}" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

<body>

    <!-- Spinner -->
    <div id="spinner" class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
    </div>

    <!-- Topbar -->
    <div class="container-fluid bg-secondary top-bar wow fadeIn">
        <div class="row align-items-center h-100">
            <div class="col-lg-4 text-center text-lg-start">
                <a href="index.html">
                    <h1 class="display-5 text-primary m-0">Charitize</h1>
                </a>
            </div>
        </div>
    </div>

    <!-- Navbar -->
    <a href="index.html" class="nav-item nav-link">Home</a>
    <a href="about.html" class="nav-item nav-link">About</a>
    <a href="donation.html" class="nav-item nav-link active">Donation</a>
    <a href="contact.html" class="nav-item nav-link">Contact</a>

    <!-- Page Header -->
    <div class="container-fluid page-header py-5 wow fadeIn">
        <div class="container text-center py-4">
            <h1 class="display-3">Donation</h1>
        </div>
    </div>

    <!-- Video Button -->
    <button type="button" class="btn-play"
        data-bs-toggle="modal"
        data-src="https://www.youtube.com/embed/DWRcNpR6Kdc"
        data-bs-target="#videoModal">
        <span></span>
    </button>

    <!-- Donation Images -->
    <img src="{{ url_for('static', filename='img/donation-1.jpg') }}" class="img-fluid w-100">
    <img src="{{ url_for('static', filename='img/donation-2.jpg') }}" class="img-fluid w-100">
    <img src="{{ url_for('static', filename='img/donation-3.jpg') }}" class="img-fluid w-100">

    <!-- Gallery Images -->
    <img src="{{ url_for('static', filename='img/gallery-1.jpg') }}" class="img-fluid w-100">
    <img src="{{ url_for('static', filename='img/gallery-2.jpg') }}" class="img-fluid w-100">
    <img src="{{ url_for('static', filename='img/gallery-3.jpg') }}" class="img-fluid w-100">
    <img src="{{ url_for('static', filename='img/gallery-4.jpg') }}" class="img-fluid w-100">
    <img src="{{ url_for('static', filename='img/gallery-5.jpg') }}" class="img-fluid w-100">
    <img src="{{ url_for('static', filename='img/gallery-6.jpg') }}" class="img-fluid w-100">

    <!-- JS Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="{{ url_for('static', filename='lib/wow/wow.min.js') }}"></script>
    <script src="{{ url_for('static', filename='lib/easing/easing.min.js') }}"></script>
    <script src="{{ url_for('static', filename='lib/waypoints/waypoints.min.js') }}"></script>
    <script src="{{ url_for('static', filename='lib/owlcarousel/owl.carousel.min.js') }}"></script>
    <script src="{{ url_for('static', filename='lib/counterup/counterup.min.js') }}"></script>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
