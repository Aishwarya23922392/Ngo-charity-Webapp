<!DOCTYPE html>

    <link rel="preconnect" href="https://fonts.googleapis.com">

</head>

<body>

<!-- Spinner -->
<div id="spinner" class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
</div>

<!-- Topbar -->
<div class="container-fluid bg-secondary top-bar wow fadeIn" data-wow-delay="0.1s">
    <div class="row align-items-center h-100">

        <div class="col-lg-4 text-center text-lg-start">
            <a href="{{ url_for('index') }}">

            </a>
        </div>

        <div class="col-lg-8 d-none d-lg-block">
            <div class="row">

                <div class="col-lg-4">
                    <div class="d-flex justify-content-end">
                        <div class="flex-shrink-0 btn-square bg-primary">
                            <i class="fa fa-phone-alt text-dark"></i>
                        </div>
                        <div class="ms-2">
                            <h6 class="text-primary mb-0">Call Us</h6>
                            <span class="text-white">+012 345 6789</span>

                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="d-flex justify-content-end">
                        <div class="flex-shrink-0 btn-square bg-primary">

                        </div>
                        <div class="ms-2">
                            <h6 class="text-primary mb-0">Mail Us</h6>
                            <span class="text-white">info@domain.com</span>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="d-flex justify-content-end">
                        <div class="flex-shrink-0 btn-square bg-primary">
                            <i class="fa fa-map-marker-alt text-dark"></i>
                        </div>
                        <div class="ms-2">
                            <h6 class="text-primary mb-0">Address</h6>
                            <span class="text-white">123 Street, NY, USA</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <div class="nav-bar">
        <nav class="navbar navbar-expand-lg bg-primary navbar-dark px-4 py-lg-0">

            <h4 class="d-lg-none m-0">Menu</h4>

            <button type="button" class="navbar-toggler me-0" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarCollapse">

                <div class="navbar-nav me-auto">

                    <a href="{{ url_for('index') }}" class="nav-item nav-link">Home</a>
                    <a href="{{ url_for('about') }}" class="nav-item nav-link">About</a>
                    <a href="{{ url_for('donation') }}" class="nav-item nav-link">Donation</a>

                    <div class="nav-item dropdown">
                        <a href="#" class="nav-link dropdown-toggle active" data-bs-toggle="dropdown">Pages</a>
                        <div class="dropdown-menu bg-light m-0">
                            <a href="{{ url_for('feature') }}" class="dropdown-item">Feature</a>
                            <a href="{{ url_for('team') }}" class="dropdown-item">Our Team</a>
                            <a href="{{ url_for('testimonial') }}" class="dropdown-item active">Testimonial</a>
                            <a href="{{ url_for('page404') }}" class="dropdown-item">404 Page</a>
                        </div>
                    </div>

                    <a href="{{ url_for('contact') }}" class="nav-item nav-link">Contact</a>
                </div>

            </div>

        </nav>
    </div>

<div class="container-fluid page-header py-5 wow fadeIn" data-wow-delay="0.1s">
    <div class="container text-center py-4">
        <h1 class="display-3 animated slideInDown">Testimonial</h1>
    </div>
</div>

<!-- Video Section -->
<div class="container-fluid bg-primary mb-5 wow fadeIn" data-wow-delay="0.1s">
    <div class="container">
        <div class="row g-0">

            <div class="col-lg-11">
                <div class="h-100 py-5 d-flex align-items-center">
                    <button type="button" class="btn-play"
                        data-bs-toggle="modal"
                        data-src="https://www.youtube.com/embed/DWRcNpR6Kdc"
                        data-bs-target="#videoModal">

                    </button>

                    <h3 class="ms-5 mb-0">
                        Together, we can build a world where everyone has the chance to thrive.
                    </h3>
                </div>
            </div>

        </div>
    </div>
</div>

<div class="modal fade" id="videoModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content rounded-0">
            <div class="modal-body">
                <div class="ratio ratio-16x9">
                    <iframe id="video" src="" allow="autoplay"></iframe>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Testimonial Images -->
<div class="container-fluid py-5">
    <div class="container">

        <div class="row g-5">

                    </div>

                    <div class="testimonial-item">
                        <img src="{{ url_for('static', filename='img/testimonial-2.jpg') }}" class="img-fluid">
                    </div>

                    <div class="testimonial-item">

                    </div>

                </div>

    <div class="container text-center">

</div>

    <div class="container">

        </div>

    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
